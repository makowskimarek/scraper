<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Carbon Silesia – Runmageddon Raport</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
            background: #111;
            color: #ddd;
        }
        h1 { color: #ff6600; margin-bottom: 4px; font-size: 1.4em; }
        .subtitle { color: #666; font-size: 0.82em; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
        button {
            padding: 9px 22px;
            font-size: 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        #fetchBtn  { background: #ff6600; color: #fff; }
        #fetchBtn:hover  { background: #e05500; }
        #fetchBtn:disabled { background: #444; color: #888; cursor: not-allowed; }
        #downloadBtn { background: #1a7a1a; color: #fff; display: none; }
        #downloadBtn:hover { background: #145a14; }
        #retryBtn { background: #cc8800; color: #fff; display: none; }
        #retryBtn:hover { background: #aa7000; }
        #retryBtn:disabled { background: #444; color: #888; cursor: not-allowed; }
        #status { color: #999; font-size: 13px; }
        #report {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            background: #1a1a1a;
            border: 1px solid #2e2e2e;
            border-radius: 6px;
            padding: 18px 20px;
            white-space: pre;
            overflow-x: auto;
            line-height: 1.55;
        }
        .spinner {
            display: inline-block;
            width: 13px; height: 13px;
            border: 2px solid #444;
            border-top-color: #ff6600;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #stages { display: none; flex-direction: column; gap: 4px; margin-bottom: 14px; }
        .etap {
            font-family: 'Consolas', monospace;
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 3px;
            border-left: 3px solid #333;
            background: #1a1a1a;
            color: #666;
            transition: background 0.2s, color 0.2s;
        }
        .etap.loading { border-color: #ff6600; color: #ff9944; background: #1e1700; }
        .etap.retry   { border-color: #cc9900; color: #ffcc44; background: #1e1c00; }
        .etap.ok      { border-color: #2a8a2a; color: #55cc55; background: #0e1a0e; }
        .etap.error   { border-color: #882222; color: #cc5555; background: #1a0e0e; }
        #report .winner { color: #ffd700; font-weight: bold; }
        .input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
        .input-row label { color: #888; font-size: 12px; min-width: 80px; }
        .input-row input {
            flex: 1; min-width: 260px;
            background: #1e1e1e; border: 1px solid #3a3a3a; border-radius: 4px;
            color: #ddd; font-size: 13px; padding: 6px 10px;
            font-family: 'Consolas', monospace;
        }
        .input-row input:focus { outline: none; border-color: #ff6600; }
    </style>
</head>
<body>
    <h1>B4Sport Raport Klubowy</h1>

    <div class="input-row">
        <label>URL zawodów</label>
        <input id="inputUrl" type="text" placeholder="https://wyniki.b4sport.pl/.../e7340.html"
            value="https://wyniki.b4sport.pl/runmageddon-rekrut-warszawa-zalew-bardowskiego/e7340.html" />
    </div>
    <div class="input-row">
        <label>Nazwa klubu</label>
        <input id="inputKlub" type="text" placeholder="Nazwa klubu / drużyny"
            value="Carbon Silesia Sport by Fitness Authority" />
    </div>

    <div class="controls">
        <button id="fetchBtn" onclick="generujRaport()">▶ Generuj raport</button>
        <button id="retryBtn" onclick="retryBledne()">↩ Spróbuj ponownie</button>
        <button id="downloadBtn" onclick="pobierzPlik()">⬇ Zapisz jako TXT</button>
        <span id="status"></span>
    </div>

    <div id="stages"></div>

    <pre id="report">Kliknij "Generuj raport" aby pobrać i przetworzyć wyniki ze wszystkich stron.</pre>

<script>
const PROXY = '/api/proxy?url=';

// Wypełniane dynamicznie przed każdym raportem
let STRONY        = [];
let KLUB_FRAGMENT = '';
let DRUZYNA_NAZWA = '';

function buildFilterParams(team) {
    const t = encodeURIComponent(team).replace(/%20/g, '+');
    return `FiltersForm%5Bsurname%5D=&FiltersForm%5Bnumber%5D=&FiltersForm%5Bteam%5D=${t}` +
           `&FiltersForm%5Bcity%5D=&FiltersForm%5Bcountry%5D=&FiltersForm%5Bcategory_name%5D=` +
           `&FiltersForm%5Bcategory_place%5D=&FiltersForm%5Bplace_sex%5D=&FiltersForm%5Bstarting_wave%5D=` +
           `&auto=0&embeded=0&full_results=0&location_nr=-1&times=0`;
}

function bazUrl(url) { return url.split('?')[0]; }

function budujStrony(bazaUrl, team) {
    const fp  = buildFilterParams(team);
    const baz = bazaUrl.split('?')[0];
    return [
        { klucz: 'glowna', tytul: 'WYNIKI OGÓLNE', url: `${baz}?${fp}` }
    ];
}

function rozszerzyOElite(html, team, bazaUrl) {
    const doc    = new DOMParser().parseFromString(html, 'text/html');
    const linki  = Array.from(doc.querySelectorAll('a[href]'));
    const fp = buildFilterParams(team);

    const znajdzUrl = (...fragmenty) => {
        const a = linki.find(el => fragmenty.some(f => (el.getAttribute('href') || '').includes(f)));
        if (!a) return null;
        const h = a.getAttribute('href');
        try {
            const abs = h.startsWith('http') ? h : new URL(h, bazaUrl).href;
            return abs.split('?')[0];
        } catch { return null; }
    };

    const dodatkowe = [];
    const urlElitaM  = znajdzUrl('elite-mezczyzn');
    const urlElitaK  = znajdzUrl('elite-kobiet');
    const urlDruzyna = znajdzUrl('druzynowa-elite');

    if (urlElitaM)  dodatkowe.push({ klucz: 'elitaM',  tytul: 'ELITE MĘŻCZYŹNI', url: `${urlElitaM}?${fp}` });
    if (urlElitaK)  dodatkowe.push({ klucz: 'elitaK',  tytul: 'ELITE KOBIETY',   url: `${urlElitaK}?${fp}` });
    if (urlDruzyna) dodatkowe.push({ klucz: 'druzyna', tytul: 'DRUŻYNOWA ELITE', url: urlDruzyna });

    return dodatkowe;
}

function dodajEtap(klucz, tytul) {
    const el  = document.getElementById('stages');
    const div = document.createElement('div');
    div.className = 'etap';
    div.id        = `etap-${klucz}`;
    div.textContent = `⏳ ${tytul} — oczekuje`;
    el.appendChild(div);
}

let raportTekst = '';
let docsMap = {};
let nagłówekLinie = [];

// ─── Helpers ──────────────────────────────────────────────────────────────────

const MAX_RETRIES  = 4;
const RETRY_DELAY  = 800; // ms stały między próbami

function setStatus(msg, loading = false) {
    document.getElementById('status').innerHTML = loading
        ? `<span class="spinner"></span>${msg}`
        : msg;
}

function initStages() {
    const el = document.getElementById('stages');
    el.style.display = 'flex';
    el.innerHTML = STRONY.map(s =>
        `<div class="etap" id="etap-${s.klucz}">⏳ ${s.tytul} — oczekuje</div>`
    ).join('');
}

function setEtap(klucz, stan, msg) {
    const el = document.getElementById(`etap-${klucz}`);
    if (!el) return;
    const tytul = STRONY.find(s => s.klucz === klucz)?.tytul || klucz;
    const ikona = { loading: '⟳', retry: '↩', ok: '✓', error: '✗' }[stan] || '⏳';
    el.className = `etap ${stan}`;
    el.textContent = `${ikona} ${tytul} — ${msg}`;
}

function czekaj(ms) { return new Promise(r => setTimeout(r, ms)); }

async function fetchRaw(url, onStatus) {
    let ostatniBlad;
    for (let proba = 1; proba <= MAX_RETRIES; proba++) {
        try {
            if (proba === 1) {
                onStatus('loading', 'pobieranie...');
            } else {
                onStatus('retry', `próba ${proba}/${MAX_RETRIES}, czekam ${RETRY_DELAY}ms...`);
                await czekaj(RETRY_DELAY);
                onStatus('loading', `pobieranie (próba ${proba}/${MAX_RETRIES})...`);
            }
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), 15000);
            let resp;
            try {
                resp = await fetch(PROXY + encodeURIComponent(url), { signal: ctrl.signal });
            } finally {
                clearTimeout(timer);
            }
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
                throw new Error(err.error || `HTTP ${resp.status}`);
            }
            const html = await resp.text();
            if (!html || html.trim().length < 100)
                throw new Error('pusta lub niepełna odpowiedź');
            onStatus('ok', `OK (${Math.round(html.length / 1024)} KB)`);
            return html;
        } catch (e) {
            ostatniBlad = e;
            if (proba === MAX_RETRIES) {
                onStatus('error', `błąd po ${MAX_RETRIES} próbach: ${e.message}`);
                throw e;
            }
        }
    }
}

async function fetchStrona(url, klucz) {
    const html = await fetchRaw(url, (stan, msg) => setEtap(klucz, stan, msg));
    return new DOMParser().parseFromString(html, 'text/html');
}

function parsujTabelę(doc) {
    const tabele = Array.from(doc.querySelectorAll('table'));
    if (!tabele.length) return null;

    // Szukaj tabeli z nagłówkami wyników (zawodnik, msc, numer, kategoria)
    const słowaKlucz = ['zawodnik', 'msc', 'numer', 'kategoria'];
    let tabela = tabele.find(t => {
        const nagłówekTekst = (t.querySelector('thead tr, tr') || { textContent: '' })
            .textContent.toLowerCase();
        return słowaKlucz.filter(s => nagłówekTekst.includes(s)).length >= 2;
    });

    // Fallback: największa tabela
    if (!tabela) {
        tabela = tabele.sort((a, b) =>
            b.querySelectorAll('tr').length - a.querySelectorAll('tr').length
        )[0];
    }

    const wiersze = Array.from(tabela.querySelectorAll('tr'));
    if (!wiersze.length) return null;

    // Nagłówki (szukaj th lub pierwszego tr z wieloma komórkami)
    let nagłówki = [];
    let startIdx = 0;
    for (let i = 0; i < Math.min(4, wiersze.length); i++) {
        const ths = wiersze[i].querySelectorAll('th');
        if (ths.length > 2) {
            nagłówki = Array.from(ths).map(th => th.textContent.trim().replace(/\s+/g, ' '));
            startIdx = i + 1;
            break;
        }
    }
    if (!nagłówki.length) {
        const tds = wiersze[0].querySelectorAll('td');
        if (tds.length > 2) {
            nagłówki = Array.from(tds).map(td => td.textContent.trim().replace(/\s+/g, ' '));
            startIdx = 1;
        }
    }

    // Indeks kolumn (case-insensitive)
    const idx = {};
    nagłówki.forEach((h, i) => { idx[h.toLowerCase()] = i; });

    // Wiersze danych
    const dane = [];
    for (let i = startIdx; i < wiersze.length; i++) {
        const koms = wiersze[i].querySelectorAll('td');
        if (koms.length < 2) continue;
        const row = Array.from(koms).map(td => td.textContent.trim().replace(/\s+/g, ' '));
        if (row.every(k => k === '')) continue;
        dane.push(row);
    }

    return { nagłówki, idx, dane };
}

// Pobierz wartość komórki po nazwie kolumny (lista aliasów)
function getKol(row, idx, ...nazwy) {
    for (const n of nazwy) {
        const i = idx[n.toLowerCase()];
        if (i !== undefined && row[i] !== undefined) return row[i];
    }
    // Częściowe dopasowanie
    for (const n of nazwy) {
        const key = Object.keys(idx).find(k => k.includes(n.toLowerCase()));
        if (key !== undefined && row[idx[key]] !== undefined) return row[idx[key]];
    }
    return '';
}

function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ─── Logika raportu ────────────────────────────────────────────────────────────

function analizujStroneKlub(tabela, plec) {
    // plec: 'M' dla mężczyzn, 'K' dla kobiet (do sprawdzania K/M)
    const { idx, dane } = tabela;

    const carboni = dane.filter(row => {
        const klub = getKol(row, idx, 'klub', 'club', 'team', 'drużyna');
        return klub.toLowerCase().includes(KLUB_FRAGMENT);
    });

    // Top 3 ogólnie wg miejsca (Msc 1, 2 lub 3)
    const top3Msc = carboni.filter(row => {
        const msc = getKol(row, idx, 'msc', 'miejsce', 'place').trim();
        return /^[123]$/.test(msc);
    });

    // Elite Masters Mężczyzn top 3 mkat
    const mastersMTop3 = carboni.filter(row => {
        const kat  = getKol(row, idx, 'kategoria', 'cat', 'category').toLowerCase();
        const mkat = getKol(row, idx, 'mkat', 'msc kat', 'miejsce kat').trim();
        return kat.includes('elite masters') && kat.includes('m') && !kat.includes('kobiet') && /^[123]$/.test(mkat);
    });

    // Elite Masters Kobiet top 3 mkat
    const mastersKTop3 = carboni.filter(row => {
        const kat  = getKol(row, idx, 'kategoria', 'cat', 'category').toLowerCase();
        const mkat = getKol(row, idx, 'mkat', 'msc kat', 'miejsce kat').trim();
        return kat.includes('elite masters') && kat.includes('kobiet') && /^[123]$/.test(mkat);
    });

    return { carboni, top3Msc, mastersMTop3, mastersKTop3 };
}

function formatWiersz(row, idx, kolumny) {
    return kolumny.map(([label, ...aliasy]) => {
        const val = getKol(row, idx, ...aliasy) || '—';
        return `  ${label}: ${val}`;
    }).join('  ');
}

function sekcjaKlub(tytul, wyniki, idx, wyrozniaj = true) {
    const linie = [];
    const KOL_OSOBA = [
        ['Msc',      'msc', 'miejsce', 'place'],
        ['Zawodnik', 'zawodnik', 'name', 'imię'],
        ['Nr',       'numer', 'nr', 'bib'],
        ['Kategoria','kategoria', 'cat'],
        ['K/M',      'k/m', 'msc k/m'],
        ['Mkat',     'mkat'],
        ['Czas',     'czas brutto', 'brutto', 'czas netto', 'netto'],
        ['Tempo',    'tempo min/km', 'tempo'],
    ];

    const pad = (s, n) => { s = s || ''; return s.length > n ? s.slice(0, n - 1) + '…' : s.padEnd(n); };

    linie.push(esc(`┌─ ${tytul} ${'─'.repeat(Math.max(0, 60 - tytul.length))}┐`));
    linie.push('');

    linie.push(esc(`  Zawodnicy ${wyniki.klubNazwa || KLUB_FRAGMENT}: ${wyniki.carboni.length}`));
    linie.push('');

    // Top 3 ogólnie (Msc 1-3)
    if (wyrozniaj && wyniki.top3Msc.length) {
        linie.push('  TOP 3 ogólnie:');
        wyniki.top3Msc.forEach(row => {
            const msc      = esc(getKol(row, idx, 'msc', 'miejsce') || '?');
            const zawodnik = esc(getKol(row, idx, 'zawodnik', 'name') || '?');
            const kat      = esc(getKol(row, idx, 'kategoria', 'cat') || '?');
            const czas     = esc(getKol(row, idx, 'czas brutto', 'brutto', 'czas netto', 'netto') || '?');
            linie.push(`<strong class="winner">    ★ Msc ${msc}: ${zawodnik}  |  Kategoria: ${kat}  |  Czas: ${czas}</strong>`);
        });
        linie.push('');
    }

    // Elite Masters top 3 Mkat
    if (wyrozniaj && wyniki.mastersMTop3.length) {
        linie.push('  TOP 3 Mkat – Elite Masters Mężczyzn:');
        wyniki.mastersMTop3.forEach(row => {
            const zawodnik = esc(getKol(row, idx, 'zawodnik', 'name') || '?');
            const kat      = esc(getKol(row, idx, 'kategoria', 'cat') || '?');
            const mkat     = esc(getKol(row, idx, 'mkat') || '?');
            const isTop3   = /^[123]$/.test(mkat);
            const line = `    ${isTop3 ? '★ ' : '  '}${zawodnik}  |  Kategoria: ${kat}  |  Mkat: ${mkat}`;
            linie.push(isTop3 ? `<strong class="winner">${line}</strong>` : line);
        });
        linie.push('');
    }

    if (wyrozniaj && wyniki.mastersKTop3.length) {
        linie.push('  TOP 3 Mkat – Elite Masters Kobiet:');
        wyniki.mastersKTop3.forEach(row => {
            const zawodnik = esc(getKol(row, idx, 'zawodnik', 'name') || '?');
            const kat      = esc(getKol(row, idx, 'kategoria', 'cat') || '?');
            const mkat     = esc(getKol(row, idx, 'mkat') || '?');
            const isTop3   = /^[123]$/.test(mkat);
            const line = `    ${isTop3 ? '★ ' : '  '}${zawodnik}  |  Kategoria: ${kat}  |  Mkat: ${mkat}`;
            linie.push(isTop3 ? `<strong class="winner">${line}</strong>` : line);
        });
        linie.push('');
    }

    // Pełna lista
    linie.push('  Pełna lista:');
    const szerokosci = KOL_OSOBA.map(([label, ...aliasy]) => {
        const maks = Math.max(label.length, ...wyniki.carboni.map(row => (getKol(row, idx, ...aliasy) || '').length));
        return Math.min(maks, 30);
    });
    const headerLine = KOL_OSOBA.map(([label], i) => pad(label, szerokosci[i])).join(' │ ');
    const sepLine    = szerokosci.map(w => '─'.repeat(w)).join('─┼─');
    linie.push('  ' + esc(headerLine));
    linie.push('  ' + esc(sepLine));
    wyniki.carboni.forEach(row => {
        const mkat   = getKol(row, idx, 'mkat').trim();
        const isTop3 = wyrozniaj && /^[123]$/.test(mkat);
        const cells  = KOL_OSOBA.map(([, ...aliasy], i) => pad(esc(getKol(row, idx, ...aliasy)), szerokosci[i]));
        const line   = '  ' + cells.join(' │ ');
        linie.push(isTop3 ? `<strong class="winner">${line}</strong>` : line);
    });

    linie.push('');
    linie.push(esc(`└${'─'.repeat(64)}┘`));
    return linie.join('\n');
}

function analizujDruzyne(doc) {
    const linie = [];
    linie.push(`┌─ DRUŻYNOWA ELITE ${'─'.repeat(45)}┐`);
    linie.push('');

    // Znajdź wszystkie tabele i wybierz tę z nagłówkiem zawierającym "drużyn" lub "team"
    const tabele = Array.from(doc.querySelectorAll('table'));
    const tabela = tabele.find(t => {
        const txt = (t.querySelector('thead tr, tr') || { textContent: '' }).textContent.toLowerCase();
        return txt.includes('drużyn') || txt.includes('team') || txt.includes('msc');
    }) || tabele.sort((a, b) => b.querySelectorAll('tr').length - a.querySelectorAll('tr').length)[0];

    if (!tabela) {
        linie.push('  [Nie znaleziono tabeli drużynowej]');
        linie.push('');
        linie.push(`└${'─'.repeat(64)}┘`);
        return linie.join('\n');
    }

    // Nagłówki
    const wiersze = Array.from(tabela.querySelectorAll('tr'));
    let nagłówki = [];
    let danePoczątek = 0;
    for (let i = 0; i < Math.min(3, wiersze.length); i++) {
        const ths = wiersze[i].querySelectorAll('th');
        if (ths.length > 1) {
            nagłówki = Array.from(ths).map(th => th.textContent.trim().replace(/\s+/g, ' '));
            danePoczątek = i + 1;
            break;
        }
    }

    // Znajdź wiersz drużyny — szukaj w td bezpośrednio (bez spłaszczania sub-elementów)
    const nazwa = DRUZYNA_NAZWA.toUpperCase();
    let wiersz = null;
    for (let i = danePoczątek; i < wiersze.length; i++) {
        const tds = Array.from(wiersze[i].querySelectorAll('td'));
        if (tds.some(td => td.textContent.toUpperCase().includes(nazwa))) {
            wiersz = wiersze[i];
            break;
        }
    }

    if (!wiersz) {
        linie.push(esc(`  [Nie znaleziono drużyny: ${DRUZYNA_NAZWA}]`));
        linie.push('');
        // debug: pokaż pierwsze 3 wiersze
        for (let i = danePoczątek; i < Math.min(danePoczątek + 3, wiersze.length); i++) {
            const txt = wiersze[i].textContent.trim().replace(/\s+/g, ' ').slice(0, 120);
            linie.push(esc(`  [debug] wiersz ${i}: ${txt}`));
        }
        linie.push('');
        linie.push(`└${'─'.repeat(64)}┘`);
        return linie.join('\n');
    }

    const tds = Array.from(wiersz.querySelectorAll('td'));

    // Znajdź indeksy kluczowych kolumn
    const iMsc      = nagłówki.findIndex(h => h.toLowerCase().includes('msc') || h.toLowerCase().includes('miejsce'));
    const iZaw      = nagłówki.findIndex(h => h.toLowerCase().includes('zawodnik'));
    const iCzasInd  = nagłówki.findIndex((h, i) => h.toLowerCase().startsWith('czas') && !h.toLowerCase().includes('łączn') && i !== iMsc);
    const iCzasLacz = nagłówki.findIndex(h => h.toLowerCase().includes('łączn') || h.toLowerCase().includes('total'));

    const mscTxt      = (tds[iMsc]      || tds[0])?.textContent.trim() || '?';
    const czasLaczTxt = (tds[iCzasLacz] || tds[tds.length - 1])?.textContent.trim() || '';

    // Podziel komórkę na linie wg tagów <br>
    function splitByBr(td) {
        if (!td) return [];
        const lines = [];
        let buf = '';
        td.childNodes.forEach(n => {
            if (n.nodeName === 'BR') {
                if (buf.trim()) lines.push(buf.trim());
                buf = '';
            } else {
                buf += n.textContent || '';
            }
        });
        if (buf.trim()) lines.push(buf.trim());
        return lines.filter(Boolean);
    }

    // Pobierz zawodników i czasy
    const linesZaw  = splitByBr(tds[iZaw]     || tds[2]);
    const linesCzas = splitByBr(tds[iCzasInd] || null);
    const czasPat   = /\b(\d{2}:\d{2}:\d{2}[.,]\d{2})\b/;

    const zawodnicy = linesZaw.map((line, i) => {
        const match = line.match(czasPat);
        if (match) {
            return { name: line.replace(match[0], '').replace(/[-–]\s*$/, '').trim(), czas: match[1] };
        }
        return { name: line, czas: linesCzas[i] || '' };
    });

    // Wyświetl
    linie.push(`<strong class="winner">  ★ MIEJSCE: ${esc(mscTxt)}   CZAS ŁĄCZNY: ${esc(czasLaczTxt)}</strong>`);
    linie.push('');

    if (zawodnicy.length) {
        linie.push('  Zawodnicy:');
        const maxName = Math.max(10, ...zawodnicy.map(z => z.name.length));
        const sep = `  ${'─'.repeat(maxName + 2)}${'┼─'}${'─'.repeat(12)}`;
        linie.push(esc(`  ${'Zawodnik'.padEnd(maxName + 2)}│ Czas`));
        linie.push(esc(sep));
        zawodnicy.forEach(z => {
            const line = `  ${z.name.padEnd(maxName + 2)}│ ${z.czas}`;
            linie.push(`<strong class="winner">${esc(line)}</strong>`);
        });
    }

    linie.push('');
    linie.push(`└${'─'.repeat(64)}┘`);
    return linie.join('\n');
}

// ─── Render i retry ───────────────────────────────────────────────────────────

function renderRaport() {
    const linie = [...nagłówekLinie];

    for (const strona of STRONY) {
        const doc = docsMap[strona.klucz];
        if (!doc) {
            linie.push(esc(`[BŁĄD: nie pobrano ${strona.tytul}]`));
            linie.push('');
            continue;
        }

        if (strona.klucz === 'druzyna') {
            linie.push(analizujDruzyne(doc));
            linie.push('');
            continue;
        }

        const tabela = parsujTabelę(doc);
        if (!tabela) {
            linie.push(esc(`[Nie znaleziono tabeli: ${strona.tytul}]`));
            linie.push('');
            continue;
        }

        const analiza = analizujStroneKlub(tabela);
        linie.push(sekcjaKlub(strona.tytul, analiza, tabela.idx, strona.klucz !== 'glowna'));
        linie.push('');
    }

    linie.push('─'.repeat(66));
    linie.push('Źródła danych:');
    STRONY.forEach(s => linie.push(esc(`  ${s.tytul}: ${s.url}`)));

    const raportHtml = linie.join('\n');
    raportTekst = raportHtml.replace(/<[^>]+>/g, '');
    document.getElementById('report').innerHTML = raportHtml;
    document.getElementById('downloadBtn').style.display = 'inline-block';

    const bledow = STRONY.filter(s => document.getElementById(`etap-${s.klucz}`)?.classList.contains('error')).length;
    document.getElementById('retryBtn').style.display = bledow ? 'inline-block' : 'none';
    setStatus(bledow
        ? `⚠ Gotowe z błędami (${bledow}/${STRONY.length} nieudanych) – ${new Date().toLocaleTimeString('pl-PL')}`
        : `✓ Gotowe – ${new Date().toLocaleTimeString('pl-PL')}`);
}

async function retryBledne() {
    const sfailowane = STRONY.filter(s =>
        document.getElementById(`etap-${s.klucz}`)?.classList.contains('error')
    );
    if (!sfailowane.length) return;

    const fetchBtn  = document.getElementById('fetchBtn');
    const retryBtn  = document.getElementById('retryBtn');
    fetchBtn.disabled = true;
    retryBtn.disabled = true;

    setStatus(`Ponawianie ${sfailowane.length} nieudanych requestów...`, true);

    await Promise.allSettled(sfailowane.map(async s => {
        try {
            if (s.klucz === 'glowna') {
                const html = await fetchRaw(s.url, (stan, msg) => setEtap('glowna', stan, msg));
                docsMap['glowna'] = new DOMParser().parseFromString(html, 'text/html');
            } else {
                docsMap[s.klucz] = await fetchStrona(s.url, s.klucz);
            }
        } catch {
            docsMap[s.klucz] = null;
        }
    }));

    renderRaport();
    fetchBtn.disabled = false;
    retryBtn.disabled = false;
}

// ─── Główna funkcja ────────────────────────────────────────────────────────────

async function generujRaport() {
    const bazaUrl = document.getElementById('inputUrl').value.trim();
    const team    = document.getElementById('inputKlub').value.trim();

    if (!bazaUrl) { alert('Podaj URL zawodów.'); return; }
    if (!team)    { alert('Podaj nazwę klubu.'); return; }

    const btn = document.getElementById('fetchBtn');
    btn.disabled = true;
    document.getElementById('downloadBtn').style.display = 'none';
    document.getElementById('retryBtn').style.display = 'none';
    document.getElementById('report').textContent = '';
    document.getElementById('stages').style.display = 'none';
    document.getElementById('stages').innerHTML = '';
    raportTekst = '';

    // Ustaw globalne zmienne dla tej sesji
    KLUB_FRAGMENT = team.toLowerCase();
    DRUZYNA_NAZWA = team.toLowerCase();

    STRONY = budujStrony(bazaUrl, team);
    initStages();
    setStatus('Krok 1/2: pobieranie wyników ogólnych...', true);

    nagłówekLinie = [
        '═'.repeat(66),
        esc(`  ${document.title.toUpperCase()} – RAPORT`),
        `  Wygenerowano: ${new Date().toLocaleString('pl-PL')}`,
        '═'.repeat(66),
        '',
    ];

    try {
        // ── Krok 1: pobierz stronę główną i wyciągnij z niej linki do elite ──
        let glowaHtml;
        try {
            glowaHtml = await fetchRaw(STRONY[0].url, (stan, msg) => setEtap('glowna', stan, msg));
        } catch (e) {
            setEtap('glowna', 'error', e.message);
            throw new Error(`Nie udało się pobrać strony głównej: ${e.message}`);
        }

        const dodatkowe = rozszerzyOElite(glowaHtml, team, bazaUrl);
        if (dodatkowe.length) {
            // Dodaj nowe sekcje do STRONY i do panelu stagów
            dodatkowe.forEach(s => {
                STRONY.push(s);
                dodajEtap(s.klucz, s.tytul);
            });
            // Posortuj: drużyna → elitaM → elitaK → ogólne
            const ORDER = { druzyna: 0, elitaM: 1, elitaK: 2, glowna: 3 };
            STRONY.sort((a, b) => (ORDER[a.klucz] ?? 9) - (ORDER[b.klucz] ?? 9));
        }

        // ── Krok 2: pobierz pozostałe strony równolegle ──
        setStatus('Krok 2/2: pobieranie kategorii...', true);

        docsMap = { glowna: new DOMParser().parseFromString(glowaHtml, 'text/html') };

        await Promise.allSettled(
            STRONY.filter(s => s.klucz !== 'glowna').map(async s => {
                try {
                    docsMap[s.klucz] = await fetchStrona(s.url, s.klucz);
                } catch (e) {
                    docsMap[s.klucz] = null;
                }
            })
        );

        renderRaport();

    } catch (e) {
        setStatus('');
        document.getElementById('report').textContent = 'Błąd: ' + e.message;
    } finally {
        btn.disabled = false;
    }
}

function pobierzPlik() {
    if (!raportTekst) return;
    const blob = new Blob([raportTekst], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const klubSlug = KLUB_FRAGMENT.replace(/\s+/g, '_').slice(0, 30);
    a.download = `${klubSlug}_${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
    URL.revokeObjectURL(url);
}
